version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
  - package-ecosystem: npm
    directory: "/"
    reviewers:
      - louismaximepiton
      - jacques-lebourgeois
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    rebase-strategy: disabled
  - package-ecosystem: npm
    directory: "/test/angular-ngx-echarts"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    groups:
      angular-ngx-echarts-all-deps:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/test/angular-echarts"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    groups:
      angular-echarts-all-deps:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/test/angular-ng-boosted"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    ignore:
      - dependency-name: "@angular/animations"
      - dependency-name: "@angular/common"
      - dependency-name: "@angular/compiler"
      - dependency-name: "@angular/core"
      - dependency-name: "@angular/forms"
      - dependency-name: "@angular/platform-browser"
      - dependency-name: "@angular/platform-browser-dynamic"
      - dependency-name: "@angular/router"
      - dependency-name: "@angular/build"
      - dependency-name: "@angular/cli"
      - dependency-name: "@angular/compiler-cli"
      - dependency-name: "@angular/localize"
      - dependency-name: "@popperjs/core"
      - dependency-name: "rxjs"
    groups:
      angular-ng-boosted-all-deps:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/test/react"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    groups:
      react-all-deps:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/test/vue"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    groups:
      vue-all-deps:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: "/test/angular-14"
    labels:
      - dependencies
    schedule:
      interval: monthly
    versioning-strategy: increase
    ignore:
      - dependency-name: "@angular-devkit/build-angular"
      - dependency-name: "@angular/animations"
      - dependency-name: "@angular/common"
      - dependency-name: "@angular/compiler"
      - dependency-name: "@angular/core"
      - dependency-name: "@angular/forms"
      - dependency-name: "@angular/platform-browser"
      - dependency-name: "@angular/platform-browser-dynamic"
      - dependency-name: "@angular/router"
      - dependency-name: "rxjs"
      - dependency-name: "tslib"
      - dependency-name: "zone.js"
      - dependency-name: "@angular/cli"
      - dependency-name: "@angular/compiler-cli"
      - dependency-name: "@types/jasmine"
      - dependency-name: "@types/node"
      - dependency-name: "jasmine-core"
      - dependency-name: "karma"
      - dependency-name: "karma-chrome-launcher"
      - dependency-name: "karma-coverage"
      - dependency-name: "karma-jasmine"
      - dependency-name: "karma-jasmine-html-reporter"
      - dependency-name: "typescript"
    groups:
      angular-14-all-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "@angular-devkit/build-angular"
          - "@angular/animations"
          - "@angular/common"
          - "@angular/compiler"
          - "@angular/core"
          - "@angular/forms"
          - "@angular/platform-browser"
          - "@angular/platform-browser-dynamic"
          - "@angular/router"
          - "rxjs"
          - "tslib"
          - "zone.js"
          - "@angular/cli"
          - "@angular/compiler-cli"
          - "@types/jasmine"
          - "@types/node"
          - "jasmine-core"
          - "karma"
          - "karma-chrome-launcher"
          - "karma-coverage"
          - "karma-jasmine"
          - "karma-jasmine-html-reporter"
          - "typescript"
